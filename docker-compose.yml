services:
  db:
    image: postgres:14          # 사용할 PostgreSQL 이미지 버전
    container_name: retrack-db  # 컨테이너 이름
    environment:
      POSTGRES_DB: retrack       # 생성할 DB 이름
      POSTGRES_USER: retrack     # DB 접속 계정
      POSTGRES_PASSWORD: retrack1234  # DB 접속 비밀번호
    ports:
      - "5432:5432"             # 호스트:컨테이너 포트 매핑
    volumes:
      - postgres-data:/var/lib/postgresql/data  # 데이터 영속성 보장 (컨테이너 삭제해도 데이터 유지)

  backend:
    build: ./backend            # ./backend 폴더의 Dockerfile로 이미지 빌드
    container_name: retrack-backend
    ports:
      - "8080:8080"
    depends_on:
      - db                      # db 컨테이너가 먼저 실행된 후 시작
    environment:
      DB_HOST: db               # 컨테이너 내부에서 db 서비스 이름으로 접근
      DB_PORT: 5432
      DB_NAME: retrack
      DB_USER: retrack
      DB_PASSWORD: retrack1234

  frontend:
    build: ./frontend           # ./frontend 폴더의 Dockerfile로 이미지 빌드
    container_name: retrack-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend                 # backend 컨테이너가 먼저 실행된 후 시작

volumes:
  postgres-data:                # 위에서 사용한 볼륨 선언