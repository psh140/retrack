<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 0; background: #f5f5f5; font-family: var(--rt-font-sans); }
  .frame { width: 100%; display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 64px 1fr; height: 320px; }
  .sider { grid-row: 1 / 3; background: #fff; border-right: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; color: var(--rt-fg-tertiary); font-size: 12px; font-family: var(--rt-font-mono); }
  .header { background: #fff; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; padding: 0 24px; color: var(--rt-fg-tertiary); font-size: 12px; font-family: var(--rt-font-mono); }
  .content { padding: 24px; color: var(--rt-fg-tertiary); font-size: 12px; font-family: var(--rt-font-mono); }
  .tag { background: #f0f0f0; padding: 1px 6px; border-radius: 2px; color: var(--rt-fg); }
</style></head>
<body>
  <div class="frame">
    <div class="sider">sider <span class="tag">220px</span></div>
    <div class="header">header <span class="tag" style="margin-left: 8px;">64px</span></div>
    <div class="content">content <span class="tag">padding: 24px</span></div>
  </div>
</body></html>
