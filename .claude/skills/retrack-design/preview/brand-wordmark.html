<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 18px 20px; background: #fff; display: flex; align-items: center; gap: 28px; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .lockup img { display: block; }
  .brand { font-size: 36px; font-weight: 600; color: #1677ff; letter-spacing: -0.6px; }
  .meta { display: flex; flex-direction: column; gap: 4px; margin-left: 20px; }
  .strong { font-size: 16px; font-weight: 600; color: rgba(0,0,0,0.88); }
  .sub { font-size: 13px; color: rgba(0,0,0,0.65); }
  .tag { font-size: 11px; color: var(--rt-fg-tertiary); font-family: var(--rt-font-mono); }
</style></head>
<body>
  <div class="lockup">
    <img src="../assets/logo-mark.svg" width="56" height="56"/>
    <div class="brand">Retrack</div>
  </div>
  <div class="meta">
    <div class="strong">Retrack</div>
    <div class="sub">연구과제 관리 시스템</div>
    <div class="tag">R-mark + wordmark · <span style="color:#1677ff;">#1677ff</span></div>
  </div>
</body></html>
