<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: #fff; }
  .header { height: 64px; background: #fff; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
  .brand { font-size: 18px; font-weight: 600; color: rgba(0,0,0,0.88); }
  .right { display: flex; align-items: center; gap: 12px; }
  .tag { display: inline-flex; padding: 1px 8px; border-radius: 2px; border: 1px solid; font-size: 12px; line-height: 20px; font-family: var(--rt-font-mono); }
  .btn { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 11px; border-radius: 6px; font-size: 14px; background: transparent; border: none; color: rgba(0,0,0,0.88); cursor: pointer; }
  .btn:hover { background: rgba(0,0,0,0.06); }
  .ico { width: 14px; height: 14px; }
</style></head>
<body>
  <div class="header">
    <div class="brand">Retrack</div>
    <div class="right">
      <span class="tag" style="background:#e6f4ff; border-color:#91caff; color:#0958d9;">RESEARCHER</span>
      <button class="btn"><img class="ico" src="../assets/icons/logout.svg" alt=""/>로그아웃</button>
    </div>
  </div>
</body></html>
