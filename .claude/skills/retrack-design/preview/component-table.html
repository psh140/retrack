<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 16px; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #fafafa; padding: 12px 16px; text-align: left; font-weight: 500; color: rgba(0,0,0,0.88); border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; color: rgba(0,0,0,0.88); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .tag { display: inline-flex; padding: 1px 8px; border-radius: 2px; border: 1px solid; font-size: 12px; line-height: 20px; font-family: var(--rt-font-mono); }
  .num { font-variant-numeric: tabular-nums; }
</style></head>
<body>
  <table>
    <thead><tr><th>과제명</th><th>상태</th><th>담당자</th><th>예산</th><th>마감</th></tr></thead>
    <tbody>
      <tr><td>2026 식품안전성 평가</td><td><span class="tag" style="background:#f0f5ff; border-color:#adc6ff; color:#1d39c4;">IN_PROGRESS</span></td><td>김연구</td><td class="num">12,400,000원</td><td>2026-12-31</td></tr>
      <tr><td>의약품 표시 가이드라인 개정</td><td><span class="tag" style="background:#e6fffb; border-color:#87e8de; color:#08979c;">REVIEWING</span></td><td>이담당</td><td class="num">8,000,000원</td><td>2026-08-15</td></tr>
      <tr><td>HACCP 인증 컨설팅</td><td><span class="tag" style="background:#f6ffed; border-color:#b7eb8f; color:#389e0d;">APPROVED</span></td><td>박매니저</td><td class="num">5,600,000원</td><td>2026-10-30</td></tr>
    </tbody>
  </table>
</body></html>
