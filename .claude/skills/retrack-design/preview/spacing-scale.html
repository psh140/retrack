<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: #fff; }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .bar { background: #e6f4ff; border: 1px solid #91caff; border-radius: 4px; }
  .label { font-size: 11px; font-family: var(--rt-font-mono); color: var(--rt-fg-tertiary); text-align: center; margin-top: 6px; }
  .item { display: flex; flex-direction: column; align-items: center; }
  .px { color: var(--rt-fg-secondary); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width: 4px; height: 24px;"></div><div class="label"><div>xxs</div><div class="px">4</div></div></div>
    <div class="item"><div class="bar" style="width: 8px; height: 32px;"></div><div class="label"><div>xs</div><div class="px">8</div></div></div>
    <div class="item"><div class="bar" style="width: 12px; height: 40px;"></div><div class="label"><div>sm</div><div class="px">12</div></div></div>
    <div class="item"><div class="bar" style="width: 16px; height: 48px;"></div><div class="label"><div>md</div><div class="px">16</div></div></div>
    <div class="item"><div class="bar" style="width: 24px; height: 56px;"></div><div class="label"><div>lg</div><div class="px">24</div></div></div>
    <div class="item"><div class="bar" style="width: 32px; height: 64px;"></div><div class="label"><div>xl</div><div class="px">32</div></div></div>
    <div class="item"><div class="bar" style="width: 48px; height: 72px;"></div><div class="label"><div>xxl</div><div class="px">48</div></div></div>
  </div>
</body></html>
