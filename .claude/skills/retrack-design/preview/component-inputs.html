<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: #fff; display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 14px; color: rgba(0,0,0,0.88); }
  label::before { content: '* '; color: #ff4d4f; }
  label.opt::before { content: ''; }
  input { height: 32px; padding: 4px 11px; font-size: 14px; border: 1px solid #d9d9d9; border-radius: 6px; background: #fff; color: rgba(0,0,0,0.88); font-family: var(--rt-font-sans); outline: none; transition: all 200ms; }
  input::placeholder { color: rgba(0,0,0,0.25); }
  input:hover { border-color: #4096ff; }
  input.focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(5,145,255,0.1); }
  input.error { border-color: #ff4d4f; }
  input:disabled { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.25); cursor: not-allowed; }
  .err { font-size: 12px; color: #ff4d4f; margin-top: 2px; }
</style></head>
<body>
  <div class="field"><label>이메일</label><input placeholder="이메일을 입력하세요"/></div>
  <div class="field"><label>비밀번호</label><input type="password" class="focus" value="••••••••"/></div>
  <div class="field"><label>이름</label><input class="error" value=""/><div class="err">이름을 입력하세요.</div></div>
  <div class="field"><label class="opt">연락처</label><input disabled placeholder="연락처를 입력하세요 (선택)"/></div>
</body></html>
