<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: #fff; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--rt-border-secondary); }
  .row:last-child { border-bottom: none; }
  .label { width: 96px; color: var(--rt-fg-tertiary); font-size: 11px; font-family: var(--rt-font-mono); text-transform: uppercase; letter-spacing: 0.04em; }
</style></head>
<body>
  <div class="row"><span class="label">Body 14/400</span><span style="font-size: 14px; line-height: 1.5715; color: var(--rt-fg);">연구과제 관리 시스템 — 본문 텍스트 14px</span></div>
  <div class="row"><span class="label">Body strong</span><span style="font-size: 14px; line-height: 1.5715; font-weight: 500; color: var(--rt-fg);">테이블 헤더 · Typography.Text strong (500)</span></div>
  <div class="row"><span class="label">Secondary</span><span style="font-size: 14px; line-height: 1.5715; color: var(--rt-fg-secondary);">type="secondary" — 보조 정보 (65% black)</span></div>
  <div class="row"><span class="label">Tertiary</span><span style="font-size: 14px; line-height: 1.5715; color: var(--rt-fg-tertiary);">placeholder / disabled — 안내 문구 (45% black)</span></div>
  <div class="row"><span class="label">Small 12</span><span style="font-size: 12px; line-height: 1.66; color: var(--rt-fg-secondary);">캡션 · 2026-05-14 · 메타 정보</span></div>
  <div class="row"><span class="label">Link</span><span style="font-size: 14px;"><a href="#">회원가입</a> · <a href="#">로그인</a></span></div>
</body></html>
