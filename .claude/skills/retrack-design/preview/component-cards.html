<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: #f5f5f5; display: flex; gap: 16px; }
  .card { background: #fff; border-radius: 6px; border: 1px solid #f0f0f0; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.03), 0 1px 6px -1px rgba(0,0,0,0.02), 0 2px 4px 0 rgba(0,0,0,0.02); width: 280px; }
  .card-head { padding: 12px 24px; border-bottom: 1px solid #f0f0f0; font-size: 16px; font-weight: 500; color: rgba(0,0,0,0.88); }
  .card-body { padding: 20px 24px; font-size: 14px; color: rgba(0,0,0,0.88); }
  .meta { color: rgba(0,0,0,0.45); font-size: 12px; margin-top: 6px; }
  .num { font-size: 28px; font-weight: 600; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #f0f0f0; font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .row .k { color: rgba(0,0,0,0.65); }
</style></head>
<body>
  <div class="card">
    <div class="card-head">진행 중 과제</div>
    <div class="card-body">
      <div class="num">12</div>
      <div class="meta">전월 대비 +3건</div>
    </div>
  </div>
  <div class="card">
    <div class="card-head">연구비 집계</div>
    <div class="card-body">
      <div class="row"><span class="k">인건비</span><span>4,200,000원</span></div>
      <div class="row"><span class="k">여비</span><span>800,000원</span></div>
      <div class="row"><span class="k">연구활동비</span><span>3,400,000원</span></div>
    </div>
  </div>
</body></html>
