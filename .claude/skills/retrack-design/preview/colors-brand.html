<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: #fff; }
  .stack { display: flex; gap: 12px; }
  .item { flex: 1; }
  .swatch { height: 64px; border-radius: 6px; border: 1px solid var(--rt-border-secondary); }
  .name { font-size: 12px; margin-top: 8px; color: var(--rt-fg); font-weight: 500; }
  .hex { font-size: 11px; font-family: var(--rt-font-mono); color: var(--rt-fg-tertiary); }
</style></head>
<body>
  <div class="stack">
    <div class="item"><div class="swatch" style="background: #0958d9;"></div><div class="name">active</div><div class="hex">#0958d9</div></div>
    <div class="item"><div class="swatch" style="background: #1677ff;"></div><div class="name">brand · primary</div><div class="hex">#1677ff</div></div>
    <div class="item"><div class="swatch" style="background: #4096ff;"></div><div class="name">hover</div><div class="hex">#4096ff</div></div>
    <div class="item"><div class="swatch" style="background: #91caff;"></div><div class="name">border</div><div class="hex">#91caff</div></div>
    <div class="item"><div class="swatch" style="background: #e6f4ff;"></div><div class="name">bg · selected</div><div class="hex">#e6f4ff</div></div>
  </div>
</body></html>
