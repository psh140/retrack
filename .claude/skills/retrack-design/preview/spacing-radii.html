<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 20px; background: #fff; display: flex; gap: 28px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 80px; height: 64px; background: #fff; border: 1px solid var(--rt-border); }
  .label { font-size: 11px; font-family: var(--rt-font-mono); color: var(--rt-fg-tertiary); text-align: center; }
  .name { color: var(--rt-fg); font-weight: 500; }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius: 0;"></div><div class="label"><div class="name">none</div><div>0px</div></div></div>
  <div class="item"><div class="box" style="border-radius: 2px;"></div><div class="label"><div class="name">xs · tags</div><div>2px</div></div></div>
  <div class="item"><div class="box" style="border-radius: 4px;"></div><div class="label"><div class="name">sm</div><div>4px</div></div></div>
  <div class="item"><div class="box" style="border-radius: 6px;"></div><div class="label"><div class="name">default</div><div>6px</div></div></div>
  <div class="item"><div class="box" style="border-radius: 8px;"></div><div class="label"><div class="name">lg</div><div>8px</div></div></div>
</body></html>
